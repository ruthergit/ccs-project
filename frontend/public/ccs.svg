<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#ff6b35"/>
  
  <!-- Inner White Circle -->
  <circle cx="100" cy="100" r="80" fill="#ffffff"/>
  
  <!-- Decorative Ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ff8c42" stroke-width="2"/>
  
  <!-- CCS Text -->
  <text x="100" y="115" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#ff6b35" text-anchor="middle">CCS</text>
  
  <!-- Subtitle -->
  <text x="100" y="140" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ff8c42" text-anchor="middle">PROFILING SYSTEM</text>
  
  <!-- Decorative Elements - Top -->
  <circle cx="100" cy="25" r="5" fill="#ff8c42"/>
  <circle cx="100" cy="175" r="5" fill="#ff8c42"/>
  <circle cx="25" cy="100" r="5" fill="#ff8c42"/>
  <circle cx="175" cy="100" r="5" fill="#ff8c42"/>
  
  <!-- Corner Decorations -->
  <circle cx="45" cy="45" r="4" fill="#ffa566" opacity="0.6"/>
  <circle cx="155" cy="45" r="4" fill="#ffa566" opacity="0.6"/>
  <circle cx="45" cy="155" r="4" fill="#ffa566" opacity="0.6"/>
  <circle cx="155" cy="155" r="4" fill="#ffa566" opacity="0.6"/>
</svg>
